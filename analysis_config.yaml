# Configuration for PhD Data Analysis Pipeline
# data_mode: "example" (uses 01_Instrument-Data/00_Example-Data) 
#            "full"    (uses 01_Instrument-Data/ - requires full dataset)
data_mode: "example"

paths:
  example:
    input_dir: "01_Instrument-Data/00_Example-Data"
    output_dir: "03_Output"
    meta_data: "02_Data-Analysis/02_Workspace/data/meta_data.csv"
  
  full:
    input_dir: "01_Instrument-Data"
    output_dir: "03_Output"
    meta_data: "02_Data-Analysis/02_Workspace/data/meta_data.csv"

# Global plotting settings
plotting:
  style: "seaborn-v0_8-ticks"
  label_fontsize: 20
  title_fontsize: 15
  dpi: 100
  formats: ["svg", "tiff"]
